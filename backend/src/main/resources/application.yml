server:
  port: 8080

spring:
  application:
    name: notsy-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notsydb}?timezone=UTC
    username: ${DB_USER:notsy}
    password: ${DB_PASSWORD:notsy123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:notsy-super-secret-key-256-bits-long-change-in-prod}
    expiration: ${JWT_EXPIRATION:86400000}

  ai:
    service-url: ${AI_SERVICE_URL:http://localhost:8000}

  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}

  cors:
    origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    com.notsy: DEBUG
    org.springframework.security: DEBUG
