version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: notsy
      POSTGRES_USER: notsy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notsy}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notsy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8081:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Orchestrator (uses LangChain + LangGraph agents internally)
  orchestrator:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.orchestrator
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - CHROMA_URL=http://chromadb:8000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3-70b-8192}
      - PORT=8000
    depends_on:
      redis:
        condition: service_healthy

  # Spring Boot backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/notsy
      - SPRING_DATASOURCE_USERNAME=notsy
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-notsy}
      - SPRING_REDIS_HOST=redis
      - AI_ORCHESTRATOR_URL=http://orchestrator:8000
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_started

  # React frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data: